name: Build & Push to registry

on:
  push:
    branches:
      - main # Déclenche le pipeline lors d'un push sur la branche main
  workflow_dispatch: # Permet de déclencher le pipeline manuellement depuis l'interface GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write # Nécessaire pour pouvoir publier sur GitHub Container Registry (GHCR)

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au Registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraction des métadonnées Docker (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construire et publier l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
