apiVersion: apps/v1
kind: Deployment
metadata:
  name: t4c-web
  namespace: t4c-web
  labels:
    app.kubernetes.io/name: t4c-web
spec:
  # IMPORTANT : Replicas doit être à 1. Le jeu gère l'état global en mémoire
  # et utilise une base SQLite locale. Une mise à l'échelle horizontale (replicas > 1)
  # n'est pas possible en l'état sans une refonte complète (DB partagée, Redis pour l'état, etc.).
  replicas: 1
  # Stratégie Recreate obligatoire : Kubernetes va détruire l'ancien Pod
  # avant de lancer le nouveau. Cela garantit qu'un seul Pod accède au volume RWO
  # à la fois et évite les verrous SQLite ou les erreurs de montage de volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: t4c-web
  template:
    metadata:
      labels:
        app: t4c-web
    spec:
      # L'application NodeJS gère un arrêt gracieux de 45 secondes (T4C_SHUTDOWN_SECS).
      # On définit un délai de grâce de 60s pour donner au jeu le temps de sauvegarder les joueurs,
      # d'envoyer les notifications systèmes, de fermer les connexions WebSocket et de s'arrêter proprement.
      terminationGracePeriodSeconds: 60
      containers:
        - name: t4c-web
          # Remplacez t4c-web:latest par l'image de votre registre de production (ex: registry.example.com/t4c-web:v0.1.0)
          image: ghcr.io/carpette/t4c-web:latest
          imagePullPolicy: Always # Toujours tirer la dernière image pour éviter les problèmes de cache
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: t4c-web-config
            - secretRef:
                name: t4c-web-secrets
                optional: true # Ne bloque pas le démarrage si le secret est absent ou vide
          resources:
            requests:
              cpu: "250m"       # Node.js tickrate 10Hz consomme peu hors pics
              memory: "256Mi"   # Empreinte mémoire minimale recommandée pour Node
            limits:
              cpu: "1000m"      # NodeJS étant mono-thread, 1 CPU est idéal pour le thread principal
              memory: "512Mi"   # Limite confortable pour de nombreux joueurs actifs et pathfinding
          volumeMounts:
            - name: t4c-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: t4c-data
          persistentVolumeClaim:
            claimName: t4c-web-data
