apiVersion: v1
kind: Secret
metadata:
  name: t4c-web-secrets
  namespace: t4c-web
  labels:
    app.kubernetes.io/name: t4c-web
type: Opaque
stringData:
  # Ces valeurs seront injectées à la volée par votre pipeline CI/CD (ex: avec envsubst)
  DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
  DISCORD_CHANNEL_GENERAL: "${DISCORD_CHANNEL_GENERAL}"
  DISCORD_CHANNEL_AIDE: "${DISCORD_CHANNEL_AIDE}"
  DISCORD_CHANNEL_VENTES: "${DISCORD_CHANNEL_VENTES}"
  DISCORD_CHANNEL_ROLEPLAY: "${DISCORD_CHANNEL_ROLEPLAY}"
  DISCORD_WEBHOOK_GENERAL: "${DISCORD_WEBHOOK_GENERAL}"
  DISCORD_WEBHOOK_AIDE: "${DISCORD_WEBHOOK_AIDE}"
  DISCORD_WEBHOOK_VENTES: "${DISCORD_WEBHOOK_VENTES}"
  DISCORD_WEBHOOK_ROLEPLAY: "${DISCORD_WEBHOOK_ROLEPLAY}"
